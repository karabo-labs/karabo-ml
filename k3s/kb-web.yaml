# ── k3s: kb-web (Web UI) ──
apiVersion: v1
kind: ConfigMap
metadata:
  name: kb-web-config
  namespace: mlops
data:
  KB_API_URL: "http://rag-api:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: kb-web
  namespace: mlops
  labels:
    app: kb-web
spec:
  selector:
    app: kb-web
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kb-web
  namespace: mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kb-web
  template:
    metadata:
      labels:
        app: kb-web
    spec:
      containers:
        - name: kb-web
          image: ghcr.io/dynamickarabo/karabo-ml-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: kb-web-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
